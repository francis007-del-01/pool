# Logging
logging:
  level:
    com.pool: DEBUG

# Pool Configuration
pool:
  enabled: true
  name: "example-pool"
  version: "1.0"

  # TPS-based Hierarchical Executors (each with its own queue)
  adapters:
    executors:
      # Root executor - overall TPS budget
      - id: "main"
        tps: 1000
        queue-capacity: 5000

      # Child executor for fast/VIP traffic
      - id: "fast"
        parent: "main"
        tps: 500
        queue-capacity: 2000

      # Child executor for bulk traffic
      - id: "bulk"
        parent: "main"
        tps: 300
        queue-capacity: 1000

  # Priority Strategy Configuration
  priority-strategy:
    type: FIFO

  # Priority tree - routes tasks to executors at leaf nodes
  priority-tree:
    # Level 1: Region-based routing
    - name: "L1.NORTH_AMERICA"
      condition: '$req.region == "NORTH_AMERICA"'
      nested-levels:
        # Level 2: Customer tier
        - name: "L2.PLATINUM"
          condition: '$req.customerTier == "PLATINUM"'
          nested-levels:
            # Level 3: Transaction amount
            - name: "L3.HIGH_VALUE"
              condition: "$req.transactionAmount > 100000"
              sort-by:
                field: $req.priority
                direction: DESC
              executor: "fast"

            - name: "L3.DEFAULT"
              condition: "true"
              sort-by:
                field: $req.urgency
                direction: DESC
              executor: "fast"

        - name: "L2.GOLD"
          condition: '$req.customerTier == "GOLD"'
          nested-levels:
            - name: "L3.DEFAULT"
              condition: "true"
              sort-by:
                field: $sys.submittedAt
                direction: ASC
              executor: "fast"

        - name: "L2.DEFAULT"
          condition: "true"
          nested-levels:
            - name: "L3.DEFAULT"
              condition: "true"
              sort-by:
                field: $sys.submittedAt
                direction: ASC
              executor: "bulk"

    - name: "L1.EUROPE"
      condition: '$req.region == "EUROPE"'
      nested-levels:
        - name: "L2.DEFAULT"
          condition: "true"
          nested-levels:
            - name: "L3.DEFAULT"
              condition: "true"
              sort-by:
                field: $req.priority
                direction: DESC
              executor: "fast"

    # Catch-all for other regions
    - name: "L1.DEFAULT"
      condition: "true"
      nested-levels:
        - name: "L2.DEFAULT"
          condition: "true"
          nested-levels:
            - name: "L3.DEFAULT"
              condition: "true"
              sort-by:
                field: $sys.submittedAt
                direction: ASC
              executor: "bulk"
